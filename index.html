<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACO Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:
radial-gradient(circle at top,
#1e293b,
#0f172a 40%,
#020617);

color:white;

min-height:100vh;

padding:20px;
}

.container{

max-width:900px;

margin:auto;
}

.hero{

text-align:center;

padding-top:40px;

padding-bottom:40px;
}

.logo{

font-size:48px;

margin-bottom:10px;
}

.hero h1{

font-size:42px;

font-weight:800;

margin-bottom:10px;
}

.hero p{

opacity:.7;

font-size:18px;
}

.creator{

background:
rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,.08);

padding:20px;

border-radius:24px;
}

textarea{

width:100%;

height:120px;

padding:18px;

border:none;

outline:none;

resize:none;

color:white;

font-size:16px;

border-radius:18px;

background:
rgba(255,255,255,.04);
}

button{

width:100%;

margin-top:15px;

padding:18px;

font-size:16px;

font-weight:700;

border:none;

border-radius:18px;

cursor:pointer;

background:
linear-gradient(
90deg,
#8b5cf6,
#7c3aed);

color:white;
}

button:hover{

opacity:.9;
}

.result{

margin-top:25px;

display:none;

gap:15px;

flex-direction:column;
}

.card{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

padding:20px;

border-radius:20px;
}

.card h2{

margin-bottom:15px;

font-size:20px;
}

.copy{

margin-top:15px;

width:auto;

padding:10px 14px;

font-size:14px;
}

.footer{

margin-top:50px;

text-align:center;

opacity:.5;
}

@media(max-width:768px){

.hero h1{

font-size:32px;
}

.logo{

font-size:38px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="hero">

<div class="logo">
🌸
</div>

<h1>
ACO Ultimate
</h1>

<p>
Create Stories, Characters, Storyboards,
Image Prompts and Video Prompts
from a single idea.
</p>

</div>

<div class="creator">

<textarea
id="idea"
placeholder="What do you want to create today?

Example:
Dragon Egg
Lost City
Cute Orange Cat
Ancient Kingdom
Titanic Mystery"></textarea>

<button onclick="generate()">
✨ Generate Content
</button>

</div>

<div class="result" id="result">

<div class="card">

<h2>📖 Story</h2>

<div id="story"></div>

</div>

<div class="card">

<h2>🎭 Character</h2>

<div id="character"></div>

</div>

<div class="card">

<h2>🎬 Storyboard</h2>

<div id="storyboard"></div>

</div>

<div class="card">

<h2>🖼 Image Prompt</h2>

<div id="imagePrompt"></div>

</div>

<div class="card">

<h2>🎥 Video Prompt</h2>

<div id="videoPrompt"></div>

</div>

</div>

<div class="footer">

ACO Ultimate Studio

</div>

</div>

<script>

function generate(){

let idea =
document.getElementById("idea").value;

if(!idea){

idea = "Dragon Egg";

}

document.getElementById("result").style.display="flex";

document.getElementById("story").innerHTML=`

A young explorer discovers
${idea} hidden for centuries.

As the truth unfolds,
powerful forces begin searching for it.

A dangerous adventure starts
that changes the future forever.

`;

document.getElementById("character").innerHTML=`

Main Hero:
A brave young explorer.

Mentor:
An ancient guardian.

Villain:
A mysterious organization
trying to control ${idea}.

`;

document.getElementById("storyboard").innerHTML=`

Scene 1:
Discovery of ${idea}

<br><br>

Scene 2:
The secret is revealed

<br><br>

Scene 3:
Danger approaches

<br><br>

Scene 4:
The final confrontation

<br><br>

Scene 5:
A new future begins

`;

document.getElementById("imagePrompt").innerHTML=`

Ultra detailed ${idea},
cinematic lighting,
epic atmosphere,
masterpiece,
highly detailed,
8k,
dramatic composition,
photorealistic.

`;

document.getElementById("videoPrompt").innerHTML=`

Slow cinematic camera movement.

Environmental motion.

Dynamic lighting.

Floating particles.

Movie-quality realism.

Epic atmosphere.

`;

}

</script>

</body>
</html>
